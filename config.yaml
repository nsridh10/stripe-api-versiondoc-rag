# config.yaml
# Configuration for Stripe RAG Agent
# Note: LLM provider, model, and API keys are now provided by the frontend

services:
  # Plug-and-play service selection
  embedding:
    provider: "huggingface"
    model_name: "BAAI/bge-small-en-v1.5" # Runs locally
  vector_db:
    provider: "chroma"
    persist_directory: "data/chroma_db"
    retrieval_k: 2
    similarity_threshold: 0.5 # Minimum similarity score (0-1) to include chunk in results
  memory:
    provider: "in-memory" # Options: "in-memory", "sqlite"
    sqlite_db_path: "data/conversation_memory.db" # Used if provider is "sqlite"
    context_window: 5 # Number of previous message pairs to include for context

# ---------------------------------------------------------------------------
# API Version Configuration
# ---------------------------------------------------------------------------
# Stripe uses codenames for API versions: acacia, basil, clover (alphabetical)
# This RAG currently supports basil and clover only (MVP excludes acacia)
api_versions:
  # Versions this RAG system handles (used by frontier to validate requests)
  supported:
    - "basil"
    - "clover"
  # All Stripe API versions that exist (for informative error messages)
  all_stripe_versions:
    - "acacia"
    - "basil"
    - "clover"
  # The latest/default version to use when user doesn't specify
  default_version: "clover"

api_docs:
  # Define the latest version for each API class (maps to supported version names)
  latest_versions:
    ACCOUNTS: "clover"
    CUSTOMERS: "clover"
    PAYMENT_INTENTS: "clover"
    PRICES: "clover"
    PRODUCTS: "clover"
    REFUNDS: "clover"
    SUBSCRIPTIONS: "clover"
    TRANSFERS: "clover"

  # Map file paths directly to their metadata
  # File naming convention: API_CLASS_<version>.md (e.g., CUSTOMERS_clover.md)
  files:
    # ACCOUNTS - basil and clover
    - path: "data/raw/ACCOUNTS_basil.rst"
      api_class: "ACCOUNTS"
      version: "basil"
      format: "rst"
    - path: "data/raw/ACCOUNTS_clover.md"
      api_class: "ACCOUNTS"
      version: "clover"
      format: "md"

    # CUSTOMERS - basil and clover
    - path: "data/raw/CUSTOMERS_basil.md"
      api_class: "CUSTOMERS"
      version: "basil"
      format: "md"
    - path: "data/raw/CUSTOMERS_clover.md"
      api_class: "CUSTOMERS"
      version: "clover"
      format: "md"

    # PAYMENT_INTENTS - basil and clover
    - path: "data/raw/PAYMENT_INTENTS_basil.md"
      api_class: "PAYMENT_INTENTS"
      version: "basil"
      format: "md"
    - path: "data/raw/PAYMENT_INTENTS_clover.md"
      api_class: "PAYMENT_INTENTS"
      version: "clover"
      format: "md"

    # PRICES - basil and clover
    - path: "data/raw/PRICES_basil.md"
      api_class: "PRICES"
      version: "basil"
      format: "md"
    - path: "data/raw/PRICES_clover.md"
      api_class: "PRICES"
      version: "clover"
      format: "md"

    # PRODUCTS - basil and clover
    - path: "data/raw/PRODUCTS_basil.md"
      api_class: "PRODUCTS"
      version: "basil"
      format: "md"
    - path: "data/raw/PRODUCTS_clover.md"
      api_class: "PRODUCTS"
      version: "clover"
      format: "md"

    # REFUNDS - basil and clover
    - path: "data/raw/REFUNDS_basil.md"
      api_class: "REFUNDS"
      version: "basil"
      format: "md"
    - path: "data/raw/REFUNDS_clover.md"
      api_class: "REFUNDS"
      version: "clover"
      format: "md"

    # SUBSCRIPTIONS - basil and clover
    - path: "data/raw/SUBSCRIPTIONS_basil.md"
      api_class: "SUBSCRIPTIONS"
      version: "basil"
      format: "md"
    - path: "data/raw/SUBSCRIPTIONS_clover.md"
      api_class: "SUBSCRIPTIONS"
      version: "clover"
      format: "md"

    # TRANSFERS - basil and clover
    - path: "data/raw/TRANSFERS_basil.md"
      api_class: "TRANSFERS"
      version: "basil"
      format: "md"
    - path: "data/raw/TRANSFERS_clover.md"
      api_class: "TRANSFERS"
      version: "clover"
      format: "md"

agent:
  max_rephrase_attempts: 1 # How many times to try query expansion
  max_graph_steps: 5 # Hard limit on LLM API calls per request to prevent infinite loops
  max_tool_calls: 6 # Hard limit on total individual tool invocations
  max_context_turns: 10 # Max operation-log turns injected into planner prompt
  known_api_classes:
    - "ACCOUNTS"
    - "CUSTOMERS"
    - "PAYMENT_INTENTS"
    - "SUBSCRIPTIONS"
    - "REFUNDS"
    - "PRODUCTS"
    - "PRICES"
    - "TRANSFERS"

ingestion:
  enrich_metadata: false
  #chunking_mode: "granular"
